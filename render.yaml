services:
  - type: web
    name: knowledge-assessment-backend
    runtime: docker
    dockerfilePath: Dockerfile
    rootDir: backend
    plan: free
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false

  - type: static
    name: knowledge-assessment-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://knowledge-assessment-backend.onrender.com/api
