services:
  # Backend: PHP + Apache (Docker)
  - type: web
    name: knowledge-backend
    runtime: docker
    dockerfilePath: Dockerfile
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: knowledge-db
          property: connectionString

  # Frontend: React (Static Site)
  - type: static
    name: knowledge-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: knowledge-backend
          type: web
          property: host

databases:
  - name: knowledge-db
    plan: free
